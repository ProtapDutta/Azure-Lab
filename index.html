<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Azure Lab Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        /* Robust Flex Centering */
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #020617; 
            position: relative;
        }

        /* DYNAMIC AURA */
        .aura {
            position: absolute;
            width: 800px;
            height: 800px;
            z-index: 1;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.15) 0%, rgba(253, 0, 76, 0.1) 30%, transparent 70%);
            filter: blur(100px);
            pointer-events: none;
            transform: translate(-50%, -50%);
            left: 50%;
            top: 50%;
            transition: top 0.3s ease-out, left 0.3s ease-out;
        }

        /* STABILIZED RGB CONTAINER */
        .rgb-container {
            position: relative;
            z-index: 10;
            width: 90%; /* Mobile width */
            max-width: 500px; /* Desktop cap */
            padding: 4px; 
            background: linear-gradient(90deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            border-radius: 28px;
            background-size: 400% 100%;
            animation: rainbowFlow 15s linear infinite;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            /* Force hardware acceleration to prevent 'snapping' */
            transform: translateZ(0); 
        }

        @keyframes rainbowFlow {
            0% { background-position: 0% 0%; }
            100% { background-position: 400% 0%; }
        }

        .inner-box {
            background: linear-gradient(135deg, rgba(20, 25, 35, 1) 0%, rgba(11, 15, 20, 1) 100%);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08); 
            padding: clamp(40px, 8vh, 60px) 30px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        /* SHEEN EFFECT */
        .inner-box::after {
            content: '';
            position: absolute;
            top: -100%; left: -100%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent 45%, rgba(255, 255, 255, 0.03) 50%, transparent 55%);
            animation: sheenSweep 6s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes sheenSweep {
            0% { transform: translate(-20%, -20%); }
            20% { transform: translate(20%, 20%); }
            100% { transform: translate(20%, 20%); }
        }

        h1 { 
            font-size: clamp(34px, 10vw, 58px); 
            font-weight: 800; 
            margin-bottom: 10px; 
            letter-spacing: -2px; 
            line-height: 1.1; 
        }

        p { 
            color: rgba(255, 255, 255, 0.5); 
            font-size: clamp(14px, 4vw, 17px); 
            margin-bottom: 40px; 
        }

        .btn-welcome {
            background: #fff;
            color: #000;
            padding: 16px 0; 
            width: 80%;
            max-width: 240px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 35px;
        }

        .btn-welcome:active { transform: scale(0.95); }

        /* BRAND FOOTER */
        .brand-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .brand-footer span { font-size: 9px; letter-spacing: 1.5px; color: rgba(255,255,255,0.3); font-weight: 700; }
        .microsoft-logo { display: flex; gap: 2px; width: 16px; height: 16px; flex-wrap: wrap; }
        .logo-sq { width: 7px; height: 7px; }
        .red { background: #f25022; } .green { background: #7fbb00; } 
        .blue { background: #00a4ef; } .yellow { background: #ffb900; }
        .azure-text { color: #fff; font-weight: 600; font-size: 12px; opacity: 0.7; }

        .confetti { position: absolute; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>

    <div class="aura" id="aura"></div>

    <div class="rgb-container">
        <div class="inner-box">
            <h1>Hi, Promit</h1>
            <p>Welcome to the Azure Lab Portal</p>
            
            <button class="btn-welcome" id="welcomeBtn">Welcome</button>

            <div class="brand-footer">
                <span>POWERED BY</span>
                <div class="microsoft-logo">
                    <div class="logo-sq red"></div><div class="logo-sq green"></div>
                    <div class="logo-sq blue"></div><div class="logo-sq yellow"></div>
                </div>
                <div class="azure-text">Microsoft Azure</div>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('welcomeBtn');
        const aura = document.getElementById('aura');

        // Mouse follow (Desktop)
        document.addEventListener('mousemove', (e) => {
            aura.style.left = e.clientX + 'px';
            aura.style.top = e.clientY + 'px';
        });

        // Confetti Burst
        btn.addEventListener('click', (e) => {
            const colors = ['#f25022', '#7fbb00', '#00a4ef', '#ffb900', '#ffffff'];
            const rect = btn.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            
            for (let i = 0; i < 70; i++) {
                createParticle(x, y, colors[Math.floor(Math.random() * colors.length)]);
            }
        });

        function createParticle(x, y, color) {
            const particle = document.createElement('div');
            particle.className = 'confetti';
            document.body.appendChild(particle);
            const size = Math.random() * 8 + 4;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.background = color;
            particle.style.left = `${x}px`;
            particle.style.top = `${y}px`;
            particle.animate([
                { transform: 'translate(0, 0)', opacity: 1 },
                { transform: `translate(${(Math.random()-0.5)*500}px, ${(Math.random()-0.5)*500}px)`, opacity: 0 }
            ], { duration: 1000, easing: 'ease-out' }).onfinish = () => particle.remove();
        }
    </script>
</body>
</html>
